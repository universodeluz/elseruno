<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanación · Paso a Paso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap');

:root {
  --bg: #0c0e14;
  --surface: #13151e;
  --surface2: #1a1d28;
  --border: rgba(255,255,255,0.07);
  --text: #ddd8cc;
  --dim: #7a7568;
  --accent: #c8a96e;
  --accent2: #7eb8a0;
  --accent3: #9b7ec8;
  --white: #f0ece4;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Spectral', serif;
  min-height: 100vh;
}

/* Fondo sutil */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(155,126,200,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 90%, rgba(126,184,160,0.05) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ─── HEADER ─── */
header {
  text-align:center;
  padding: 4rem 2rem 3rem;
  position:relative;
  z-index:1;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.6rem;
  font-weight:300;
  letter-spacing:0.55em;
  text-transform:uppercase;
  color: var(--accent);
  margin-bottom:1.2rem;
}

h1 {
  font-family:'Spectral', serif;
  font-size: clamp(2rem, 6vw, 3.8rem);
  font-weight:300;
  color: var(--white);
  line-height:1.15;
  margin-bottom:0.5rem;
}

h1 strong {
  font-weight:600;
  font-style:italic;
}

.header-line {
  width:40px;
  height:1px;
  background: var(--accent);
  margin: 1.5rem auto;
}

.header-desc {
  font-size:1rem;
  font-style:italic;
  color: var(--dim);
  max-width:500px;
  margin:0 auto;
  line-height:1.7;
}

/* ─── NAVEGACIÓN DE ETAPAS ─── */
.nav-strip {
  position:sticky;
  top:0;
  z-index:100;
  background: rgba(12,14,20,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
  display:flex;
  gap:0.4rem;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav-strip::-webkit-scrollbar { display:none; }

.nav-btn {
  flex-shrink:0;
  background:none;
  border:1px solid var(--border);
  color: var(--dim);
  font-family:'Josefin Sans', sans-serif;
  font-size:0.6rem;
  font-weight:300;
  letter-spacing:0.2em;
  padding:0.4rem 0.8rem;
  cursor:pointer;
  transition: all 0.2s;
  white-space:nowrap;
}
.nav-btn:hover, .nav-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(200,169,110,0.06);
}

/* ─── LAYOUT ─── */
.main {
  max-width:900px;
  margin:0 auto;
  padding:0 1.5rem 6rem;
  position:relative;
  z-index:1;
}

/* ─── ETAPA ─── */
.etapa-section {
  padding: 4rem 0 3rem;
  border-bottom: 1px solid var(--border);
}

.etapa-section:last-child { border-bottom:none; }

/* Cabecera de etapa */
.etapa-head {
  display:grid;
  grid-template-columns: 80px 1fr;
  gap:1.5rem;
  align-items:start;
  margin-bottom:2.5rem;
}

.etapa-num-block {
  text-align:center;
}

.etapa-num {
  font-family:'Spectral', serif;
  font-size:3.5rem;
  font-weight:300;
  line-height:1;
  color: var(--accent);
  opacity:0.4;
}

.etapa-roman {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.55rem;
  letter-spacing:0.4em;
  color: var(--dim);
  text-transform:uppercase;
  margin-top:0.3rem;
}

.etapa-title-block {}

.etapa-tag {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.55rem;
  letter-spacing:0.45em;
  text-transform:uppercase;
  color: var(--accent);
  margin-bottom:0.5rem;
  display:block;
}

.etapa-titulo {
  font-family:'Spectral', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight:600;
  color: var(--white);
  line-height:1.2;
  margin-bottom:0.5rem;
}

.etapa-subtitulo {
  font-size:0.9rem;
  font-style:italic;
  color: var(--dim);
}

/* Descripción general */
.etapa-desc {
  font-size:1.05rem;
  line-height:1.8;
  color: var(--text);
  margin-bottom:2.5rem;
  padding-left:calc(80px + 1.5rem);
}

/* Pasos */
.pasos-label {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.6rem;
  letter-spacing:0.45em;
  text-transform:uppercase;
  color: var(--accent2);
  margin-bottom:1.2rem;
  padding-left:calc(80px + 1.5rem);
  display:flex;
  align-items:center;
  gap:0.8rem;
}
.pasos-label::after {
  content:'';
  flex:1;
  height:1px;
  background: rgba(126,184,160,0.2);
}

.pasos {
  padding-left:calc(80px + 1.5rem);
  display:flex;
  flex-direction:column;
  gap:1rem;
  margin-bottom:2rem;
}

.paso {
  display:grid;
  grid-template-columns:32px 1fr;
  gap:1rem;
  align-items:start;
}

.paso-n {
  width:32px;
  height:32px;
  border:1px solid var(--accent2);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Josefin Sans', sans-serif;
  font-size:0.65rem;
  color: var(--accent2);
  flex-shrink:0;
  margin-top:0.15rem;
}

.paso-contenido {}

.paso-titulo {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.7rem;
  font-weight:400;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color: var(--white);
  margin-bottom:0.4rem;
}

.paso-texto {
  font-size:0.95rem;
  line-height:1.75;
  color: var(--text);
}

.paso-texto em {
  font-style:italic;
  color: var(--accent);
}

/* Declaración / decreto */
.decreto {
  background: var(--surface);
  border:1px solid rgba(200,169,110,0.2);
  border-left:3px solid var(--accent);
  padding:1.2rem 1.5rem;
  margin-top:0.8rem;
  font-style:italic;
  font-size:0.95rem;
  line-height:1.7;
  color: var(--accent);
}

/* Grid de info */
.info-grid {
  padding-left:calc(80px + 1.5rem);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0.8rem;
  margin-bottom:2rem;
}

@media(max-width:600px) {
  .info-grid { grid-template-columns:1fr 1fr; }
  .etapa-desc,
  .pasos-label,
  .pasos,
  .info-grid,
  .duracion-block,
  .señal-block { padding-left:0; }
  .etapa-head { grid-template-columns:50px 1fr; gap:1rem; }
  .etapa-num { font-size:2.5rem; }
}

.info-chip {
  background: var(--surface);
  border:1px solid var(--border);
  padding:0.8rem 1rem;
}

.info-chip-label {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.55rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color: var(--accent3);
  margin-bottom:0.3rem;
}

.info-chip-val {
  font-size:0.85rem;
  color: var(--text);
  line-height:1.4;
}

/* Duración */
.duracion-block {
  padding-left:calc(80px + 1.5rem);
  display:flex;
  align-items:center;
  gap:1rem;
  margin-bottom:2rem;
}

.duracion-bar-wrap {
  flex:1;
  height:3px;
  background: var(--surface2);
  border-radius:2px;
  overflow:hidden;
}

.duracion-bar {
  height:100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius:2px;
  transition: width 1s ease;
}

.duracion-label {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.6rem;
  letter-spacing:0.2em;
  color: var(--dim);
  white-space:nowrap;
}

/* Señal de avance */
.señal-block {
  padding-left:calc(80px + 1.5rem);
  background: rgba(126,184,160,0.05);
  border:1px solid rgba(126,184,160,0.15);
  padding:1rem 1.2rem 1rem calc(80px + 1.5rem + 1.2rem);
  margin-bottom:0.5rem;
}

@media(max-width:600px) {
  .señal-block { padding-left:1.2rem; }
}

.señal-label {
  font-family:'Josefin Sans', sans-serif;
  font-size:0.55rem;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color: var(--accent2);
  margin-bottom:0.5rem;
}

.señal-texto {
  font-size:0.9rem;
  font-style:italic;
  color: var(--dim);
  line-height:1.6;
}

</style>
</head>
<body>

<header>
  <p class="eyebrow">Protocolo Integral · Vía Esotérica</p>

  <div class="header-line"></div>
  <p class="header-desc">Cada etapa contiene sus pasos exactos, decretos, herramientas y la señal que indica que puedes avanzar a la siguiente.</p>
</header>

<nav class="nav-strip" id="navStrip"></nav>

<main class="main" id="mainContent"></main>

// Highlight nav on scroll
const sections = document.querySelectorAll('.etapa-section');
const navBtns = document.querySelectorAll('.nav-btn');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = [...sections].findIndex(s => s.id === id);
      navBtns.forEach((b,i) => b.classList.toggle('active', i === idx));
      navBtns[idx]?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
    }
  });
}, { threshold:0.3 });

sections.forEach(s => observer.observe(s));
